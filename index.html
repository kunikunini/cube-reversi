<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>NEO REVERSI | 3D Cube Reversi Game</title>
    <meta name="description" content="A futuristic 3D Cube Reversi game. Challenge the AI in this stunning 3x3x3 grid battle." />
    
    <!-- PWA -->
    <meta name="theme-color" content="#0b0f1e" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/cube_reversi_icon.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/cube_reversi_icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="NEO REVERSI" />
    <meta property="og:description" content="A futuristic 3D Cube Reversi game. Challenge the AI in this stunning 3x3x3 grid battle." />
    <meta property="og:image" content="/cube_reversi_icon.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/cube_reversi_icon.png" />
    
    <!-- Styles will be injected by Vite -->
  </head>
  <body>
    <!-- Launcher / Tap to Start -->
    <div id="launcher" class="launcher">
      <div class="launcher-bg">
        <!-- 動画を設定したい場合はここを <video> タグに差し替えます -->
        <div class="launcher-visual"></div>
      </div>
      <div class="launcher-content">
        <div class="launcher-logo">◆ NEO-REVERSI</div>
        <div class="launcher-prompt">TAP TO START</div>
      </div>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>CUBE</span>
        <span class="brand-dot m"></span>
      </div>
      <div class="title"><span class="accent">NEO</span> <span class="accent2">REVERSI</span></div>
      <div class="menu">
        <button class="icon-btn" id="homeBtn" aria-label="タイトルに戻る">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
        </button>
        <button class="icon-btn" id="muteBtn" aria-label="サウンド">♪</button>
      </div>
    </header>

    <!-- Score + timers -->
    <section class="scorebar">
      <div class="player p1 active" id="p1Panel">
        <div class="who"><span class="dot"></span>YOU</div>
        <div class="row2">
          <div class="score-val" id="p1Score">2</div>
          <div class="timer" id="p1Timer">00:00</div>
        </div>
      </div>
      <div class="vs">VS</div>
      <div class="player p2" id="p2Panel">
        <div class="who"><span class="dot"></span>AI</div>
        <div class="row2">
          <div class="score-val" id="p2Score">2</div>
          <div class="timer" id="p2Timer">00:00</div>
        </div>
      </div>
    </section>

    <!-- Face selector tabs -->
    <div class="face-tabs" id="faceTabs">
      <!-- filled by JS -->
    </div>

    <!-- Stage -->
    <div class="stage-wrap">
      <div class="stage" id="stage">
        <div class="floor"></div>
        <div class="glow"></div>
        <div class="cube" id="cube">
          <!-- 6 faces injected by JS -->
        </div>
      </div>
    </div>

    <!-- Status line -->
    <div class="status" id="status">SWIPE — キューブを回転</div>

    <!-- Controls -->
    <div class="controls">
      <div class="rotate-pad">
        <button class="rotate-btn" data-rot="left" aria-label="左に回転">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6" /></svg>
        </button>
        <button class="rotate-btn" data-rot="up" aria-label="上に回転">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15" /></svg>
        </button>
        <button class="rotate-btn" data-rot="down" aria-label="下に回転">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9" /></svg>
        </button>
        <button class="rotate-btn" data-rot="right" aria-label="右に回転">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6" /></svg>
        </button>
      </div>
      <div class="action-row">
        <button class="action-btn danger" id="resetBtn" aria-label="リセット">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <button class="action-btn" id="undoBtn" disabled aria-label="元に戻す">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
        </button>
        <button class="action-btn" id="passBtn" aria-label="パス">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
        <button class="action-btn primary" id="nextBtn" aria-label="次へ">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <!-- End-game modal -->
    <div class="overlay" id="overlay">
      <div class="modal">
        <h2>GAME OVER</h2>
        <div class="big" id="outcomeText">YOU WIN</div>
        <div class="final">
          <div class="p1"><span class="num" id="finalP1">0</span>YOU</div>
          <div class="p2"><span class="num" id="finalP2">0</span>AI</div>
        </div>
        <div id="finalTotal" style="font-size: 10px; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 12px"></div>
        <button class="big-btn" id="playAgainBtn">PLAY AGAIN</button>
        <button class="action-btn" id="reviewBtn" style="width: 100%; margin-top: 8px">盤面を確認する</button>
        <button class="action-btn" id="toTitleBtn" style="width: 100%; margin-top: 8px">タイトル画面に戻る</button>
      </div>
    </div>

    <!-- Confirmation modal -->
    <div class="overlay" id="confirmOverlay">
      <div class="modal">
        <h2 id="confirmTitle">CONFIRM</h2>
        <div id="confirmMessage" style="margin: 14px 0 24px; font-size: 13px; letter-spacing: 0.1em; color: var(--ink); line-height: 1.6;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <button class="action-btn" id="confirmCancel">CANCEL</button>
          <button class="action-btn primary" id="confirmOk">OK</button>
        </div>
      </div>
    </div>

    <div class="start-announcement" id="startAnnounce">
      <div class="lightning-effect"></div>
      <div class="start-text">START</div>
    </div>

    <!-- Tutorial / intro -->
    <div class="tut" id="tut">
      <div class="tut-inner">
        <div class="tut-logo">◆ NEO-REVERSI</div>
        <h1 class="tut-title"><span class="c">NEO</span> <span class="m">REVERSI</span></h1>
        <div class="tut-sub">3×3×3 の立方体、6面すべてが盤面。<br />スワイプでキューブを回して、好きな面に石を置こう。</div>
        <div class="tut-rows">
          <div class="tut-row">
            <div class="ic">
              <svg viewBox="0 0 24 24"><path d="M7 12h10" /><path d="M17 8l4 4-4 4" /><path d="M7 8L3 12l4 4" /></svg>
            </div>
            <div>画面をスワイプまたは矢印ボタンでキューブを回転。</div>
          </div>
          <div class="tut-row">
            <div class="ic">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" /><circle cx="12" cy="12" r="3" /></svg>
            </div>
            <div>光っているマスをタップすると石が置けます。</div>
          </div>
          <div class="tut-row">
            <div class="ic">
              <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="2" /><path d="M12 10v4" /><path d="M10 12h4" /></svg>
            </div>
            <div>各面で通常のリバーシ。合計54マス、多い方の勝ち。</div>
          </div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px">
          <button class="diff-btn active" data-diff="easy">EASY</button>
          <button class="diff-btn" data-diff="normal">NORMAL</button>
          <button class="diff-btn" data-diff="hard">HARD</button>
        </div>
        <button class="big-btn" id="startBtn">START GAME</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
